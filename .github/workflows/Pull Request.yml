name: CI on Pull Request

on:
  pull_request:
    branches:
      - '**'

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup msbuild
      uses: microsoft/setup-msbuild@v2

    - name: Install ASP.NET web workload
      shell: pwsh
      run: |
        $vsWhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
        $vsInstaller = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
        $installPath = & $vsWhere -latest -property installationPath
        & $vsInstaller modify --installPath "$installPath" --add Microsoft.VisualStudio.Workload.NetWeb --includeRecommended --quiet --norestart --wait
        if ($LASTEXITCODE -notin 0, 3010) { throw "VS workload install failed with exit code $LASTEXITCODE" }

    - name: Restore NuGet packages
      run: |
        nuget restore "Hunter Industries API.sln"
        dotnet restore "Hunter Industries API Common/Hunter Industries API Common.csproj"
        dotnet restore "Hunter Industries API Control Panel/Hunter Industries API Control Panel.csproj"
        dotnet restore "Hunter Industries API.Tests/Hunter Industries API.Tests.csproj"

    - name: Navigate to workspace
      run: cd $GITHUB_WORKSPACE

    - name: Build .NET Common project
      run: dotnet build "Hunter Industries API Common/Hunter Industries API Common.csproj" --configuration Release --no-restore

    - name: Build .NET Framework projects
      run: msbuild.exe "Hunter Industries API/Hunter Industries API.csproj" /p:configuration="Release"

    - name: Build .NET Control Panel project
      run: dotnet build "Hunter Industries API Control Panel/Hunter Industries API Control Panel.csproj" --configuration Release --no-restore

    - name: Build test project (net472)
      run: msbuild.exe "Hunter Industries API.Tests/Hunter Industries API.Tests.csproj" /p:Configuration=Release /p:TargetFramework=net472

    - name: Build test project (net10.0)
      run: dotnet build "Hunter Industries API.Tests/Hunter Industries API.Tests.csproj" --configuration Release --no-restore --framework net10.0

    - name: Run tests
      run: dotnet test "Hunter Industries API.Tests/Hunter Industries API.Tests.csproj" --configuration Release --no-build --logger "trx"

    - name: Publish API (.NET Framework)
      run: >
        msbuild.exe "Hunter Industries API/Hunter Industries API.csproj"
        /p:Configuration=Release
        /p:DeployOnBuild=true
        /p:WebPublishMethod=FileSystem
        /p:publishUrl=${{ github.workspace }}/artifacts/HunterIndustriesAPI
        /p:DeleteExistingFiles=true

    - name: Publish Control Panel (.NET 10)
      run: >
        dotnet publish
        "Hunter Industries API Control Panel/Hunter Industries API Control Panel.csproj"
        -c Release
        -o ./artifacts/HunterIndustriesAPIControlPanel

    - name: Set Build Timestamp
      id: timestamp
      run: echo "value=$(date -u +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

    - name: Upload API Artefact
      uses: actions/upload-artifact@v4
      with:
        name: HunterIndustriesAPI_${{ steps.timestamp.outputs.value }}
        path: ./artifacts/HunterIndustriesAPI

    - name: Upload Control Panel Artefact
      uses: actions/upload-artifact@v4
      with:
        name: HunterIndustriesAPIControlPanel_${{ steps.timestamp.outputs.value }}
        path: ./artifacts/HunterIndustriesAPIControlPanel
