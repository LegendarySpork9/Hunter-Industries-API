name: CI on Pull Request

on:
  pull_request:
    branches:
      - '**'

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2.1.0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup msbuild
      uses: microsoft/setup-msbuild@v1

    - name: Setup VSTest
      uses: darenm/Setup-VSTest@v1

    - name: Restore NuGet packages
      run: |
        nuget restore "Hunter Industries API.sln"
        dotnet restore "Hunter Industries API Control Panel/Hunter Industries API Control Panel.csproj"

    - name: Navigate to workspace
      run: cd $GITHUB_WORKSPACE

    - name: Build solution
      run: |
        MSBuild.exe "Hunter Industries API.sln" /p:configuration="Release"

    - name: Run tests
      run: vstest.console.exe ".\Hunter Industries API.Tests\bin\Release\Hunter Industries API.Tests.dll"
